services:
  mongo:
    image: mongo:7.0
    container_name: ${COMPOSE_PROJECT_NAME:-nosql_milano}_mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root_password}
    volumes:
      - ./mongo/data:/data/db

  neo4j:
    image: neo4j:5.26-community
    container_name: ${COMPOSE_PROJECT_NAME:-nosql_milano}_neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
